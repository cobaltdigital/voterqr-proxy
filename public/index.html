<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoterQR — Campaign Platform</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f2f1ec;--surface:#fff;--s2:#f8f7f3;--border:#e4e2d9;
  --text:#1a1916;--t2:#6b6860;--t3:#aaa89f;
  --blue:#2563eb;--blue-bg:#eff4ff;--blue-b:#bfcffc;
  --green:#16a34a;--green-bg:#f0fdf4;--green-b:#bbf7d0;
  --amber:#d97706;--amber-bg:#fffbeb;--amber-b:#fde68a;
  --red:#dc2626;--red-bg:#fef2f2;--red-b:#fecaca;
  --purple:#7c3aed;--purple-bg:#f5f3ff;--purple-b:#ddd6fe;
  --r:10px;--rs:6px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:13px}

/* ── LOGIN ── */
#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px 32px;width:100%;max-width:360px;text-align:center}
.login-logo{width:52px;height:52px;background:var(--blue);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 20px}
.login-title{font-size:22px;font-weight:600;margin-bottom:6px}
.login-sub{font-size:13px;color:var(--t2);margin-bottom:24px}
.login-err{background:var(--red-bg);color:var(--red);border:1px solid var(--red-b);border-radius:8px;padding:10px 12px;font-size:13px;margin-bottom:14px}

/* ── APP SHELL ── */
#app-screen{display:none;height:100vh;overflow:hidden}
.shell{display:flex;height:100vh}
.sb{width:56px;background:#1a1916;display:flex;flex-direction:column;align-items:center;padding:14px 0;gap:4px;flex-shrink:0}
.sb-logo{width:32px;height:32px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:10px}
.nb{width:38px;height:38px;border-radius:8px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;transition:background .15s;position:relative}
.nb:hover{background:rgba(255,255,255,.1)}
.nb.on{background:rgba(255,255,255,.18)}
.nb .tip{position:absolute;left:46px;background:#1a1916;color:#fff;font-size:11px;padding:4px 8px;border-radius:5px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:200;border:1px solid rgba(255,255,255,.1)}
.nb:hover .tip{opacity:1}
.sb-sep{width:30px;height:1px;background:rgba(255,255,255,.1);margin:4px 0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 18px;height:50px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.pg-t{font-size:15px;font-weight:600}
.top-stats{display:flex;gap:20px}
.ts{text-align:right}.ts-n{font-size:17px;font-weight:600;line-height:1}.ts-l{font-size:10px;color:var(--t2)}
.page{flex:1;overflow-y:auto;padding:18px}

/* ── COMPONENTS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:15px;margin-bottom:12px}
.card-hd{font-size:13px;font-weight:600;margin-bottom:12px}
.inp{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--rs);background:var(--s2);color:var(--text);font-size:13px;outline:none;font-family:'DM Sans',sans-serif}
.inp:focus{border-color:var(--blue)}
.inp::placeholder{color:var(--t3)}
textarea.inp{resize:vertical;min-height:70px;line-height:1.5}
select.inp{cursor:pointer}
.lbl{font-size:11px;font-weight:600;color:var(--t2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.btn{padding:6px 13px;border-radius:var(--rs);font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--s2);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:500;transition:all .12s;white-space:nowrap}
.btn:hover{background:var(--bg)}
.btn:disabled{opacity:.38;cursor:not-allowed}
.btn-blue{background:var(--blue);color:#fff;border-color:var(--blue)}.btn-blue:hover{opacity:.88}
.btn-green{background:var(--green);color:#fff;border-color:var(--green)}.btn-green:hover{opacity:.88}
.btn-red{background:var(--red-bg);color:var(--red);border-color:var(--red-b)}
.btn-amber{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-b)}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-start}
.tag{display:inline-block;padding:1px 7px;border-radius:20px;font-size:10px;font-weight:500;font-family:'DM Mono',monospace}
.tag-blue{background:var(--blue-bg);color:var(--blue)}
.tag-green{background:var(--green-bg);color:var(--green)}
.tag-amber{background:var(--amber-bg);color:var(--amber)}
.tag-red{background:var(--red-bg);color:var(--red)}
.tag-purple{background:var(--purple-bg);color:var(--purple)}
.tag-gray{background:var(--s2);color:var(--t2);border:1px solid var(--border)}
.tw{border:1px solid var(--border);border-radius:var(--rs);overflow:hidden}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{background:var(--s2);padding:7px 10px;text-align:left;font-weight:600;color:var(--t2);border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:.03em}
.tbl td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--s2)}
.scroll{overflow-y:auto;max-height:320px}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.st{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px}
.stn{font-size:28px;font-weight:600;line-height:1}.stl{font-size:11px;color:var(--t2);margin-top:3px}
.prog{height:6px;background:var(--s2);border-radius:3px;overflow:hidden;margin-top:6px}
.pf{height:100%;border-radius:3px;transition:width .4s}
.ci-card{border-radius:var(--r);padding:14px;display:flex;align-items:flex-start;gap:12px;margin-bottom:12px;border:1px solid}
.ci-ok{background:var(--green-bg);border-color:var(--green-b)}
.ci-warn{background:var(--amber-bg);border-color:var(--amber-b)}
.ci-err{background:var(--red-bg);border-color:var(--red-b)}
.avatar{border-radius:50%;background:var(--blue-bg);color:var(--blue);display:flex;align-items:center;justify-content:center;font-weight:600;font-family:'DM Mono',monospace;flex-shrink:0}
.fu-btn{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:none;font-family:'DM Sans',sans-serif;transition:all .12s}
.fu-pending.act{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-b)}
.fu-contacted.act{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-b)}
.fu-voted.act{background:var(--green-bg);color:var(--green);border-color:var(--green-b)}
.fu-noanswer.act{background:var(--red-bg);color:var(--red);border-color:var(--red-b)}
.seg-dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:5px}
.help{background:var(--s2);border:1px solid var(--border);border-radius:var(--rs);padding:11px 13px;font-size:12px;color:var(--t2);line-height:1.7}
code{font-family:'DM Mono',monospace;font-size:11px;background:var(--s2);padding:1px 5px;border-radius:3px;color:var(--blue);border:1px solid var(--border)}
.empty{text-align:center;padding:60px 20px;color:var(--t3)}
.empty-t{font-size:14px;font-weight:600;color:var(--t2);margin-bottom:6px}
.slog{display:flex;justify-content:space-between;align-items:center;padding:5px 10px;border-radius:var(--rs);margin-bottom:2px;font-size:12px}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;right:20px;background:var(--text);color:#fff;padding:10px 18px;border-radius:var(--rs);font-size:13px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.camp-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.camp-status-running{border-left:3px solid var(--blue)}
.camp-status-completed{border-left:3px solid var(--green)}
.camp-status-paused{border-left:3px solid var(--amber)}
.camp-status-ready{border-left:3px solid var(--t3)}
.import-drop{border:2px dashed var(--border);border-radius:var(--r);padding:24px;text-align:center;background:var(--s2);cursor:pointer;transition:border-color .15s}
.import-drop:hover,.import-drop.over{border-color:var(--blue);background:var(--blue-bg)}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">🗳</div>
    <div class="login-title">VoterQR</div>
    <div class="login-sub">Campaign management platform</div>
    <div class="login-err" id="l-err" style="display:none"></div>
    <div style="margin-bottom:10px;text-align:left">
      <div class="lbl">Username</div>
      <input class="inp" id="l-user" placeholder="admin" autocomplete="username" onkeydown="if(event.key==='Enter')document.getElementById('l-pass').focus()">
    </div>
    <div style="margin-bottom:18px;text-align:left">
      <div class="lbl">Password</div>
      <input type="password" class="inp" id="l-pass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-blue" style="width:100%;padding:11px;font-size:14px" onclick="doLogin()">Sign in</button>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <div class="shell">
    <div class="sb">
      <div class="sb-logo">🗳</div>
      <div class="nb on" id="nb-voters" onclick="go('voters')"><span>👥</span><span class="tip">Voters</span></div>
      <div class="nb" id="nb-segments" onclick="go('segments')"><span>🗂</span><span class="tip">Segments</span></div>
      <div class="sb-sep"></div>
      <div class="nb" id="nb-campaigns" onclick="go('campaigns')"><span>📤</span><span class="tip">Campaigns</span></div>
      <div class="nb" id="nb-checkin" onclick="go('checkin')"><span>✅</span><span class="tip">Check-In</span></div>
      <div class="nb" id="nb-followup" onclick="go('followup')"><span>🗳</span><span class="tip">Early Vote Follow-Up</span></div>
      <div class="sb-sep"></div>
      <div class="nb" id="nb-dashboard" onclick="go('dashboard')"><span>📊</span><span class="tip">Dashboard</span></div>
      <div class="nb" id="nb-settings" onclick="go('settings')"><span>⚙️</span><span class="tip">Settings</span></div>
    </div>
    <div class="main">
      <div class="topbar">
        <div><div class="pg-t" id="pg-t">Voters</div><div style="font-size:11px;color:var(--t2)" id="pg-s"></div></div>
        <div style="display:flex;align-items:center;gap:14px">
          <div class="top-stats" id="top-stats"></div>
          <button class="btn btn-red" style="font-size:11px;padding:4px 10px" onclick="doLogout()">Log out</button>
        </div>
      </div>
      <div class="page" id="page"><div class="empty"><div class="spin"></div></div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── STATE ─────────────────────────────────────────────────────────────────────
var TOKEN = localStorage.getItem('vqr_token') || '';
var CUR = 'voters';
var DATA = { voters:[], segments:[], campaigns:[], settings:{eventName:'Campaign Event 2026',checkinUrl:window.location.origin,ezUser:''}, hasCampaignImage:false };
var CI_RESULT = null, EZ_PASS = '';
var PANELS = { importOpen:false, addVoter:false, addSeg:false, addCamp:false };
var SEG_COLORS = ['#2563eb','#16a34a','#d97706','#dc2626','#7c3aed','#0891b2','#be185d','#65a30d'];
var POLL_TIMERS = {};

// ── UTILS ─────────────────────────────────────────────────────────────────────
function toast(msg,ms){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},ms||2500)}
function numStr(n){var s=String(n||0);return s.length<3?('000'+s).slice(-3):s}
function initials(v){return((v.firstName||'?')[0]+(v.lastName||'?')[0]).toUpperCase()}
function segById(id){return DATA.segments.find(function(s){return s.id===id})}

// ── AUTH ──────────────────────────────────────────────────────────────────────
async function doLogin(){
  var user=document.getElementById('l-user').value.trim();
  var pass=document.getElementById('l-pass').value.trim();
  var err=document.getElementById('l-err');
  err.style.display='none';
  if(!user||!pass){err.textContent='Enter username and password';err.style.display='block';return;}
  try{
    var r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:user,password:pass})});
    var data=await r.json();
    if(!r.ok){err.textContent=data.error||'Login failed';err.style.display='block';return;}
    TOKEN=data.token;
    localStorage.setItem('vqr_token',TOKEN);
    showApp();
  }catch(e){err.textContent='Connection error: '+e.message;err.style.display='block';}
}

function doLogout(){
  if(!confirm('Log out?'))return;
  fetch('/api/logout',{method:'POST',headers:{'x-auth-token':TOKEN}}).catch(function(){});
  TOKEN='';localStorage.removeItem('vqr_token');
  document.getElementById('app-screen').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('l-pass').value='';
}

function showApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-screen').style.display='block';
  loadAll();
}

// ── API ───────────────────────────────────────────────────────────────────────
async function api(method,path,body){
  var opts={method:method,headers:{'Content-Type':'application/json','x-auth-token':TOKEN}};
  if(body)opts.body=JSON.stringify(body);
  var r=await fetch(path,opts);
  if(r.status===401){doLogout();return{error:'Session expired'};}
  return r.json();
}
async function GET(p){return api('GET',p)}
async function POST(p,b){return api('POST',p,b)}
async function PUT(p,b){return api('PUT',p,b)}
async function DEL(p){return api('DELETE',p)}

async function loadAll(){
  try{
    var results=await Promise.all([GET('/api/voters'),GET('/api/segments'),GET('/api/campaigns'),GET('/api/settings'),GET('/api/campaign-image')]);
    DATA.voters=results[0]||[];
    DATA.segments=results[1]||[];
    DATA.campaigns=results[2]||[];
    DATA.settings=Object.assign(DATA.settings,results[3]||{});
    DATA.hasCampaignImage=(results[4]&&results[4].hasImage)||false;
    if(!DATA.settings.checkinUrl)DATA.settings.checkinUrl=window.location.origin;
    render();
    (DATA.campaigns||[]).filter(function(c){return c.status==='running'}).forEach(function(c){startPoll(c.id)});
  }catch(e){toast('Load error: '+e.message);}
}

function go(tab){
  CUR=tab;
  document.querySelectorAll('.nb').forEach(function(b){b.classList.remove('on')});
  var nb=document.getElementById('nb-'+tab);if(nb)nb.classList.add('on');
  CI_RESULT=null;render();
}

function renderTopStats(){
  var t=DATA.voters.length,ci=DATA.voters.filter(function(v){return v.checkedIn}).length;
  var voted=DATA.voters.filter(function(v){return v.followUp&&v.followUp.status==='voted'}).length;
  return'<div class="ts"><div class="ts-n" style="color:var(--blue)">'+t+'</div><div class="ts-l">Voters</div></div>'+
    '<div class="ts"><div class="ts-n" style="color:var(--green)">'+ci+'</div><div class="ts-l">Checked In</div></div>'+
    '<div class="ts"><div class="ts-n" style="color:var(--purple)">'+voted+'</div><div class="ts-l">Voted</div></div>';
}

// ── IMPORT ────────────────────────────────────────────────────────────────────
function parseCSVText(txt){
  var lines=txt.trim().split('\n').filter(function(l){return l.trim()});
  var res=[];
  lines.forEach(function(line){
    if(line.toLowerCase().includes('first')||line.toLowerCase().includes('phone'))return;
    var p=line.split(',').map(function(x){return x.trim().replace(/^"|"$/g,'')});
    if(p.length>=3)res.push({firstName:p[0],lastName:p[1],phone:p[2]});
    else if(p.length===2){var n=p[0].split(' ');res.push({firstName:n[0]||'',lastName:n.slice(1).join(' ')||'',phone:p[1]});}
    else if(p.length===1&&p[0].replace(/\D/g,'').length>=10)res.push({firstName:'',lastName:'',phone:p[0]});
  });
  return res.filter(function(v){return v.phone&&v.phone.replace(/\D/g,'').length>=10});
}

async function doImportCSV(){
  var txt=document.getElementById('csv-in').value;
  var seg=document.getElementById('import-seg')?document.getElementById('import-seg').value:'';
  var parsed=parseCSVText(txt);
  if(!parsed.length){toast('No valid rows found');return;}
  var r=await POST('/api/voters/import',{voters:parsed,segmentId:seg||null});
  PANELS.importOpen=false;await loadAll();
  toast('Added '+r.added+(r.skipped?' ('+r.skipped+' duplicates skipped)':''));
}

async function doImportFile(file){
  var reader=new FileReader();
  reader.onload=async function(e){
    var seg=document.getElementById('import-seg')?document.getElementById('import-seg').value:'';
    var parsed=parseCSVText(e.target.result);
    if(!parsed.length){toast('No valid rows found');return;}
    var r=await POST('/api/voters/import',{voters:parsed,segmentId:seg||null});
    PANELS.importOpen=false;await loadAll();
    toast('Added '+r.added+(r.skipped?' ('+r.skipped+' skipped)':''));
  };
  reader.readAsText(file);
}

// ── VOTERS ────────────────────────────────────────────────────────────────────
function voterSegTags(voter){
  if(!voter.segments||!voter.segments.length)return'<span class="tag tag-gray">—</span>';
  return voter.segments.map(function(sid){var s=segById(sid);if(!s)return'';return'<span class="tag" style="background:'+s.color+'22;color:'+s.color+';border:1px solid '+s.color+'44">'+s.name+'</span>';}).join(' ');
}
function fuTag(v){
  var st=(v.followUp&&v.followUp.status)||'pending';
  var m={pending:'tag-amber',contacted:'tag-blue',voted:'tag-green',noanswer:'tag-red'};
  var l={pending:'Pending',contacted:'Contacted',voted:'Voted ✓',noanswer:'No Answer'};
  return'<span class="tag '+(m[st]||'tag-gray')+'">'+(l[st]||st)+'</span>';
}
function segOpts(sel){
  return'<option value="">No segment</option>'+DATA.segments.map(function(s){return'<option value="'+s.id+'"'+(sel===s.id?' selected':'')+'>'+s.name+'</option>';}).join('');
}

async function doAddVoter(){
  var fn=document.getElementById('a-fn').value.trim(),ln=document.getElementById('a-ln').value.trim(),ph=document.getElementById('a-ph').value.trim(),seg=document.getElementById('a-seg').value;
  if(!ph){toast('Phone required');return;}
  await POST('/api/voters',{firstName:fn,lastName:ln,phone:ph,segments:seg?[seg]:[]});
  document.getElementById('a-fn').value='';document.getElementById('a-ln').value='';document.getElementById('a-ph').value='';
  await loadAll();toast('Voter added');
}
async function doRemoveVoter(id){if(!confirm('Remove this voter?'))return;await DEL('/api/voters/'+id);await loadAll();}
async function doClearAll(){if(!confirm('Delete ALL '+DATA.voters.length+' voters? Cannot be undone.'))return;await DEL('/api/voters/all');await loadAll();}

function renderVoters(){
  var search=(document.getElementById('v-s')?document.getElementById('v-s').value:'').toLowerCase();
  var segF=(document.getElementById('v-seg')?document.getElementById('v-seg').value:'');
  var filtered=DATA.voters.filter(function(v){
    return(v.firstName+' '+v.lastName+' '+v.phone+' '+(v.number||'')).toLowerCase().includes(search)&&(!segF||(v.segments||[]).includes(segF));
  });
  var h='<div class="row" style="margin-bottom:12px">';
  h+='<input class="inp" id="v-s" placeholder="Search name, phone, or #number..." value="'+search+'" oninput="render()" style="flex:2;min-width:130px">';
  h+='<select class="inp" id="v-seg" onchange="render()" style="flex:1;min-width:110px"><option value="">All segments</option>'+DATA.segments.map(function(s){return'<option value="'+s.id+'">'+s.name+'</option>'}).join('')+'</select>';
  h+='<button class="btn btn-blue" onclick="PANELS.importOpen=!PANELS.importOpen;render()">Import</button>';
  h+='<button class="btn btn-blue" onclick="PANELS.addVoter=!PANELS.addVoter;render()">+ Add</button>';
  if(DATA.voters.length)h+='<button class="btn btn-red" onclick="doClearAll()">Clear all</button>';
  h+='</div>';
  if(PANELS.importOpen){
    h+='<div class="card"><div class="card-hd">Import voters</div>';
    h+='<div class="import-drop" onclick="document.getElementById(\'file-in\').click()" ondragover="event.preventDefault();this.classList.add(\'over\')" ondragleave="this.classList.remove(\'over\')" ondrop="event.preventDefault();this.classList.remove(\'over\');doImportFile(event.dataTransfer.files[0])">';
    h+='<div style="font-size:22px;margin-bottom:6px">📂</div><div style="font-weight:500;margin-bottom:4px">Drop CSV file here or click to browse</div>';
    h+='<div style="font-size:11px;color:var(--t2)">Columns: First Name, Last Name, Phone — duplicates auto-skipped</div></div>';
    h+='<input type="file" id="file-in" accept=".csv,.txt" style="display:none" onchange="doImportFile(this.files[0])">';

async function doAddSeg(){
  var name=document.getElementById('seg-n').value.trim();if(!name){toast('Name required');return;}
  await POST('/api/segments',{name:name,color:SEG_COLORS[DATA.segments.length%SEG_COLORS.length]});
  PANELS.addSeg=false;await loadAll();toast('Segment created');
}
async function doRemoveSeg(id){if(!confirm('Delete segment?'))return;await DEL('/api/segments/'+id);await loadAll();}
async function doToggleSeg(voterId,segId){
  var v=DATA.voters.find(function(x){return x.id===voterId});if(!v)return;
  var segs=v.segments||[];
  segs=segs.includes(segId)?segs.filter(function(s){return s!==segId}):segs.concat([segId]);
  await PUT('/api/voters/'+voterId,{segments:segs});await loadAll();
}
async function doAssignToSeg(segId){
  var el=document.getElementById('as-'+segId);if(!el||!el.value)return;
  var v=DATA.voters.find(function(x){return x.id===el.value});if(!v)return;
  await PUT('/api/voters/'+el.value,{segments:[...(v.segments||[]),segId]});await loadAll();
}
async function doCreateNoShowSegment(){
  var ns=DATA.voters.filter(function(v){return!v.checkedIn});
  if(!ns.length){toast('Everyone checked in!');return;}
  if(!confirm('Create no-show segment with '+ns.length+' voters?'))return;
  var r=await POST('/api/segments/noshows',{name:'No Shows '+new Date().toLocaleDateString()});
  await loadAll();toast('Created "'+r.segment.name+'" with '+r.added+' voters');
}

function renderSegments(){
  var ns=DATA.voters.filter(function(v){return!v.checkedIn}).length;
  var h='<div class="row" style="margin-bottom:12px">';
  h+='<button class="btn btn-blue" onclick="PANELS.addSeg=!PANELS.addSeg;render()">+ New segment</button>';
  if(DATA.voters.length)h+='<button class="btn btn-red" onclick="doCreateNoShowSegment()">Create no-show segment ('+ns+' voters)</button>';
  h+='</div>';
  if(PANELS.addSeg){
    h+='<div class="card"><div class="card-hd">New segment</div><div class="row">';
    h+='<input class="inp" id="seg-n" placeholder="Segment name" style="flex:1" onkeydown="if(event.key===\'Enter\')doAddSeg()">';
    h+='<button class="btn btn-green" onclick="doAddSeg()">Create</button>';
    h+='<button class="btn" onclick="PANELS.addSeg=false;render()">✕</button></div></div>';
  }
  if(!DATA.segments.length)return h+'<div class="empty"><div class="empty-t">No segments yet</div>Create groups to organize voters.</div>';
  DATA.segments.forEach(function(seg){

    h+='<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">';

    h+='<span class="tag tag-gray">'+members.length+' voters</span>';
    if(ci)h+='<span class="tag tag-green">'+ci+' attended</span>';
    h+='</div><button class="btn btn-red" style="font-size:11px;padding:2px 8px" onclick="doRemoveSeg(\''+seg.id+'\')">Delete</button></div>';
    if(members.length){
      h+='<div class="tw"><div class="scroll" style="max-height:150px"><table class="tbl"><thead><tr><th>#</th><th>Name</th><th>Phone</th><th>Status</th><th></th></tr></thead><tbody>';
      members.forEach(function(v){
        h+='<tr><td style="font-family:DM Mono,monospace;color:var(--blue)">#'+numStr(v.number||0)+'</td><td>'+v.firstName+' '+v.lastName+'</td>';
        h+='<td style="font-family:DM Mono,monospace;color:var(--t2);font-size:11px">'+v.phone+'</td>';
        h+='<td>'+(v.checkedIn?'<span class="tag tag-green">Attended</span>':'<span class="tag tag-gray">Pending</span>')+'</td>';
        h+='<td><button class="btn" style="font-size:11px;padding:2px 7px" onclick="doToggleSeg(\''+v.id+'\',\''+seg.id+'\')">Remove</button></td></tr>';
      });
      h+='</tbody></table></div></div>';
    }
    var non=DATA.voters.filter(function(v){return!(v.segments||[]).includes(seg.id)});
    if(non.length){
      h+='<div class="row" style="margin-top:10px"><select class="inp" id="as-'+seg.id+'" style="flex:1"><option value="">— Add voter —</option>';
      non.forEach(function(v){h+='<option value="'+v.id+'">#'+numStr(v.number||0)+' '+v.firstName+' '+v.lastName+' ('+v.phone+')</option>';});
      h+='</select><button class="btn btn-blue" onclick="doAssignToSeg(\''+seg.id+'\')">Add</button></div>';
    }
    h+='</div>';
  });
  return h;
}

// ── CAMPAIGNS ─────────────────────────────────────────────────────────────────
function startPoll(id){
  if(POLL_TIMERS[id])return;
  POLL_TIMERS[id]=setInterval(async function(){
    var status=await GET('/api/campaigns/'+id+'/status').catch(function(){return null;});
    if(!status)return;
    var camp=DATA.campaigns.find(function(c){return c.id===id});
    if(camp)Object.assign(camp,status);else DATA.campaigns.push(status);
    if(status.status!=='running'){clearInterval(POLL_TIMERS[id]);delete POLL_TIMERS[id];}
    render();
  },2000);
}

async function doCreateCampaign(){
  var name=document.getElementById('c-name').value.trim();
  var msg=document.getElementById('c-msg').value.trim();
  var seg=document.getElementById('c-seg').value;
  var mode=document.getElementById('c-mode').value;
  var pass=document.getElementById('c-pass').value.trim();
  if(!name||!msg||!pass){toast('Name, message and password are required');return;}
  EZ_PASS=pass;
  var r=await POST('/api/campaigns',{name:name,segmentId:seg||null,message:msg,mode:mode,ezUser:DATA.settings.ezUser,ezPass:pass});
  if(r.error){toast('Error: '+r.error);return;}
  PANELS.addCamp=false;await loadAll();toast('Campaign "'+name+'" created');
}

async function doStartCampaign(id){
  var pass=EZ_PASS||prompt('Enter EZTexting password:');
  if(!pass)return;EZ_PASS=pass;
  await POST('/api/campaigns/'+id+'/start',{ezPass:pass});
  var camp=DATA.campaigns.find(function(c){return c.id===id});
  if(camp)camp.status='running';
  startPoll(id);render();toast('Campaign started on server — safe to close browser');
}

async function doPauseCampaign(id){
  await POST('/api/campaigns/'+id+'/pause');
  var camp=DATA.campaigns.find(function(c){return c.id===id});
  if(camp)camp.status='paused';
  clearInterval(POLL_TIMERS[id]);delete POLL_TIMERS[id];
  render();toast('Paused');
}

async function doRetryFailed(id){
  var pass=EZ_PASS||prompt('Enter EZTexting password:');
  if(!pass)return;EZ_PASS=pass;
  await POST('/api/campaigns/'+id+'/retry-failed',{ezPass:pass});
  var camp=DATA.campaigns.find(function(c){return c.id===id});
  if(camp)camp.status='running';
  startPoll(id);render();toast('Retrying failed sends...');
}

async function doDeleteCampaign(id){
  if(!confirm('Delete this campaign and all its history?'))return;
  await DEL('/api/campaigns/'+id);await loadAll();
}

function campStatusTag(s){
  var m={running:'tag-blue',completed:'tag-green',paused:'tag-amber',ready:'tag-gray'};
  var l={running:'Sending...',completed:'Completed',paused:'Paused',ready:'Ready'};
  return'<span class="tag '+(m[s]||'tag-gray')+'">'+(l[s]||s)+'</span>';
}

function renderCampaigns(){
  var segOp='<option value="">All voters ('+DATA.voters.length+')</option>'+DATA.segments.map(function(s){
    var n=DATA.voters.filter(function(v){return(v.segments||[]).includes(s.id)}).length;
    return'<option value="'+s.id+'">'+s.name+' ('+n+')</option>';
  }).join('');
  var h='<div class="row" style="margin-bottom:12px"><button class="btn btn-blue" onclick="PANELS.addCamp=!PANELS.addCamp;render()">+ New campaign</button></div>';
  if(PANELS.addCamp){
    h+='<div class="card"><div class="card-hd">Create campaign</div>';
    h+='<div class="row" style="margin-bottom:10px">';
    h+='<div style="flex:2"><div class="lbl">Campaign name</div><input class="inp" id="c-name" placeholder="e.g. Event Reminder — Week 1"></div>';
    h+='<div style="flex:1"><div class="lbl">Send to</div><select class="inp" id="c-seg">'+segOp+'</select></div>';
    h+='<div style="flex:0 0 auto"><div class="lbl">Type</div><select class="inp" id="c-mode"><option value="mms">MMS (QR image)</option><option value="sms">SMS (link only)</option></select></div>';
    h+='</div>';
    h+='<div style="margin-bottom:10px"><div class="lbl">Message — <code>{first_name}</code> <code>{last_name}</code> <code>{event_name}</code> <code>{number}</code></div>';
    h+='<textarea class="inp" id="c-msg" style="margin-top:4px">Hi {first_name}! Your check-in QR for {event_name} is attached. Your voter number is {number}. Show it at the door!</textarea></div>';
    h+='<div style="margin-bottom:10px"><div class="lbl">EZTexting password</div><input type="password" class="inp" id="c-pass" value="'+EZ_PASS+'" placeholder="Stored per session only"></div>';
    h+='<div class="row"><button class="btn btn-green" onclick="doCreateCampaign()">Create campaign</button><button class="btn" onclick="PANELS.addCamp=false;render()">Cancel</button></div></div>';
  }
  if(!DATA.campaigns||!DATA.campaigns.length)return h+'<div class="empty"><div class="empty-t">No campaigns yet</div>Create a campaign to send texts to voters.</div>';
  DATA.campaigns.slice().reverse().forEach(function(camp){
    var sent=camp.sentCount||0,total=camp.total||0,failed=((camp.results||[]).filter(function(r){return!r.success}).length);
    var pct=total?Math.round(sent/total*100):0;
    var isRunning=camp.status==='running';
    var segName=camp.segmentId?(DATA.segments.find(function(s){return s.id===camp.segmentId})||{name:'Deleted segment'}).name:'All voters';
    h+='<div class="camp-card camp-status-'+camp.status+'">';
    h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">';
    h+='<div><div style="font-weight:600;font-size:14px">'+camp.name+'</div>';
    h+='<div style="font-size:12px;color:var(--t2);margin-top:2px">'+segName+' · '+(camp.mode||'mms').toUpperCase()+'</div></div>';
    h+='<div style="display:flex;gap:6px;align-items:center">'+campStatusTag(camp.status);
    if(isRunning)h+='<button class="btn btn-amber" style="font-size:11px" onclick="doPauseCampaign(\''+camp.id+'\')">Pause</button>';
    if(camp.status==='ready'||camp.status==='paused')h+='<button class="btn btn-green" style="font-size:11px" onclick="doStartCampaign(\''+camp.id+'\')">'+( camp.status==='paused'?'Resume':'Start')+'</button>';
    if(camp.status==='completed'&&failed>0)h+='<button class="btn btn-amber" style="font-size:11px" onclick="doRetryFailed(\''+camp.id+'\')">Retry '+failed+' failed</button>';
    h+='<button class="btn btn-red" style="font-size:11px" onclick="doDeleteCampaign(\''+camp.id+'\')">Delete</button>';
    h+='</div></div>';
    h+='<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">';
    h+='<span style="color:var(--t2)">'+(isRunning?'<span class="spin"></span>':'')+sent+' sent of '+total+(camp.statusMessage?' · '+camp.statusMessage:'')+'</span>';
    h+='<span style="font-weight:600;color:var(--green)">'+pct+'%</span></div>';
    h+='<div class="prog"><div class="pf" style="width:'+pct+'%;background:var(--green)"></div></div>';
    if(failed)h+='<div style="font-size:11px;color:var(--red);margin-top:4px">'+failed+' failed</div>';
    if(camp.results&&camp.results.length){
      var recent=(camp.results||[]).slice(-5).reverse();
      h+='<div style="margin-top:10px">';
      recent.forEach(function(r){
        h+='<div class="slog" style="background:var('+(r.success?'--green-bg':'--red-bg')+');color:var('+(r.success?'--green':'--red')+')">';
        h+='<span>'+r.name+' · '+r.phone+'</span><span style="font-family:DM Mono,monospace;font-size:11px">'+( r.success?'Sent':r.error||'Failed')+'</span></div>';
      });
      h+='</div>';
    }
    h+='<div style="font-size:11px;color:var(--t3);margin-top:6px">Created '+new Date(camp.createdAt).toLocaleString()+(camp.completedAt?' · Completed '+new Date(camp.completedAt).toLocaleString():'')+'</div>';
    h+='</div>';
  });
  return h;
}

// ── CHECK-IN ──────────────────────────────────────────────────────────────────
async function doCheckIn(){
  var raw=document.getElementById('ci-in').value.trim();
  if(!raw)return;
  var id=raw.toUpperCase();
  if(raw.includes('voter=')){var m=raw.match(/voter=([^&\s]+)/i);if(m)id=m[1].toUpperCase();}
  if(/^#?\d+$/.test(raw))id=raw.replace('#','');
  try{
    var r=await POST('/api/voters/'+id+'/checkin');
    CI_RESULT=r.error?{type:'err',msg:'Voter not found: '+id,voter:null}:{type:r.alreadyCheckedIn?'warn':'ok',voter:r.voter,msg:r.alreadyCheckedIn?'Already checked in at '+new Date(r.voter.checkInTime).toLocaleTimeString():'Checked in!'};
  }catch(e){CI_RESULT={type:'err',msg:e.message,voter:null};}
  document.getElementById('ci-in').value='';
  await loadAll();
  setTimeout(function(){CI_RESULT=null;render();},10000);
}

function renderCheckIn(){
  var recent=DATA.voters.filter(function(v){return v.checkedIn}).sort(function(a,b){return new Date(b.checkInTime)-new Date(a.checkInTime)}).slice(0,15);
  var r=CI_RESULT;
  var h='<div style="max-width:560px;margin:0 auto">';
  h+='<div class="card"><div class="card-hd">Check in a voter</div>';
  h+='<div style="font-size:12px;color:var(--t2);margin-bottom:10px">Enter voter ID, #number, or paste QR URL — press Enter</div>';
  h+='<div class="row"><input class="inp" id="ci-in" placeholder="Voter ID, #42, or QR URL..." onkeydown="if(event.key===\'Enter\')doCheckIn()" style="flex:1;padding:11px;font-size:15px;font-family:DM Mono,monospace" autofocus>';
  h+='<button class="btn btn-green" onclick="doCheckIn()" style="padding:11px 18px;font-size:14px">Check In</button></div></div>';
  if(r){
    var cls=r.type==='ok'?'ci-ok':r.type==='warn'?'ci-warn':'ci-err';
    h+='<div class="ci-card '+cls+'"><div style="font-size:28px">'+(r.type==='ok'?'✅':r.type==='warn'?'⚠️':'❌')+'</div>';
    h+='<div style="flex:1">';
    if(r.voter){
      h+='<div style="font-size:16px;font-weight:600">#'+numStr(r.voter.number||0)+' — '+r.voter.firstName+' '+r.voter.lastName+'</div>';
      h+='<div style="font-size:12px;color:var(--t2);font-family:DM Mono,monospace;margin-top:2px">'+r.voter.phone+'</div>';
      h+='<div style="margin-top:4px">'+r.msg+'</div>';
      h+='<div style="margin-top:6px">'+voterSegTags(r.voter)+'</div>';
    }else{h+='<div style="font-weight:600">'+r.msg+'</div>';}
    h+='</div></div>';
  }
  if(recent.length){
    h+='<div class="card"><div class="card-hd">Recent check-ins</div><table class="tbl"><tbody>';
    recent.forEach(function(v){
      h+='<tr><td style="font-family:DM Mono,monospace;color:var(--blue);font-weight:600">#'+numStr(v.number||0)+'</td>';
      h+='<td style="font-weight:500">'+v.firstName+' '+v.lastName+'</td>';
      h+='<td style="color:var(--t2);font-family:DM Mono,monospace;font-size:11px">'+v.phone+'</td>';
      h+='<td>'+voterSegTags(v)+'</td>';
      h+='<td style="color:var(--t3);font-size:11px">'+new Date(v.checkInTime).toLocaleTimeString()+'</td></tr>';
    });
    h+='</tbody></table></div>';
  }
  h+='</div>';return h;
}

    h+='<div style="font-size:12px;color:var(--t2);font-family:DM Mono,monospace">'+v.phone+'</div></div></div>';
    h+='<div>'+voterSegTags(v)+'</div></div>';
    h+='<div class="row" style="margin-bottom:8px">';

    h+='</div>';
    h+='<div class="row"><textarea class="inp" id="note-'+v.id+'" style="min-height:50px;flex:1" placeholder="Notes...">'+( fu.notes||'')+'</textarea>';
    h+='<button class="btn" id="nsave-'+v.id+'" onclick="doSaveNote(\''+v.id+'\')">Save note</button></div>';
    if(fu.lastContactDate)h+='<div style="font-size:11px;color:var(--t3);margin-top:4px">Updated '+new Date(fu.lastContactDate).toLocaleString()+'</div>';
    h+='</div>';
  });
  if(!vis.length)h+='<div style="text-align:center;padding:30px;color:var(--t3)">No voters in this category.</div>';
  return h;
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function renderDashboard(){
  var t=DATA.voters.length;
  if(!t)return'<div class="empty"><div class="empty-t">No data yet</div>Add voters to see stats.</div>';
  var ci=DATA.voters.filter(function(v){return v.checkedIn}).length;
  var voted=DATA.voters.filter(function(v){return v.followUp&&v.followUp.status==='voted'}).length;
  var contacted=DATA.voters.filter(function(v){return v.followUp&&v.followUp.status==='contacted'}).length;
  var h='<div class="sg">';
  h+='<div class="st"><div class="stn" style="color:var(--blue)">'+t+'</div><div class="stl">Total voters</div></div>';
  h+='<div class="st"><div class="stn" style="color:var(--green)">'+ci+'</div><div class="stl">Attended event</div><div class="prog"><div class="pf" style="width:'+(t?Math.round(ci/t*100):0)+'%;background:var(--green)"></div></div></div>';
  h+='<div class="st"><div class="stn" style="color:var(--purple)">'+voted+'</div><div class="stl">Confirmed voted</div><div class="prog"><div class="pf" style="width:'+(ci?Math.round(voted/ci*100):0)+'%;background:var(--purple)"></div></div></div>';
  h+='<div class="st"><div class="stn" style="color:var(--amber)">'+contacted+'</div><div class="stl">Contacted</div></div>';
  h+='</div>';
  if(DATA.segments.length){
    h+='<div class="card"><div class="card-hd">By segment</div><table class="tbl"><thead><tr><th>Segment</th><th>Voters</th><th>Attended</th><th>Voted</th><th>Rate</th></tr></thead><tbody>';
    DATA.segments.forEach(function(seg){
      var sv=DATA.voters.filter(function(v){return(v.segments||[]).includes(seg.id)});
      var sci=sv.filter(function(v){return v.checkedIn}).length;
      var svoted=sv.filter(function(v){return v.followUp&&v.followUp.status==='voted'}).length;
      var rate=sv.length?Math.round(svoted/sv.length*100):0;
      h+='<tr><td><span class="seg-dot" style="background:'+seg.color+'"></span>'+seg.name+'</td><td>'+sv.length+'</td><td>'+sci+'</td><td>'+svoted+'</td><td><span class="tag '+(rate>50?'tag-green':'tag-gray')+'">'+rate+'%</span></td></tr>';
    });
    h+='</tbody></table></div>';
  }
  if(DATA.campaigns&&DATA.campaigns.length){
    h+='<div class="card"><div class="card-hd">Campaigns</div><table class="tbl"><thead><tr><th>Name</th><th>Status</th><th>Sent</th><th>Total</th></tr></thead><tbody>';
    DATA.campaigns.forEach(function(c){h+='<tr><td style="font-weight:500">'+c.name+'</td><td>'+campStatusTag(c.status)+'</td><td>'+(c.sentCount||0)+'</td><td>'+(c.total||0)+'</td></tr>';});
    h+='</tbody></table></div>';
  }
  return h;
}

// ── SETTINGS ──────────────────────────────────────────────────────────────────
async function doSaveSettings(){
  var s={eventName:document.getElementById('s-ev').value,checkinUrl:document.getElementById('s-url').value,ezUser:document.getElementById('s-eu').value};
  await PUT('/api/settings',s);DATA.settings=Object.assign(DATA.settings,s);toast('Settings saved');
}
async function doChangeCredentials(){
  var user=document.getElementById('s-auser').value.trim();
  var pass=document.getElementById('s-apass').value.trim();
  if(!user||!pass){toast('Enter both username and new password');return;}
  await PUT('/api/settings',{adminUser:user,adminPass:pass});
  toast('Login updated — signing you out now');
  document.getElementById('s-auser').value='';
  document.getElementById('s-apass').value='';
  setTimeout(doLogout,1500);
}
async function doUploadCampaignImage(){
  var inp=document.getElementById('ci-file');
  if(!inp||!inp.files||!inp.files[0]){toast('Pick an image first');return;}
  var reader=new FileReader();
  reader.onload=async function(e){
    var b64=e.target.result.split(',')[1];
    await POST('/api/campaign-image',{imageBase64:b64});
    DATA.hasCampaignImage=true;toast('Campaign image uploaded — QRs will be regenerated');render();
  };
  reader.readAsDataURL(inp.files[0]);
}
async function doRemoveCampaignImage(){
  await DEL('/api/campaign-image');DATA.hasCampaignImage=false;toast('Campaign image removed');render();
}

function renderSettings(){
  var h='<div class="card"><div class="card-hd">Event settings</div>';
  h+='<div class="row" style="margin-bottom:10px"><div style="flex:1"><div class="lbl">Event name</div><input class="inp" id="s-ev" value="'+DATA.settings.eventName+'"></div>';
  h+='<div style="flex:2"><div class="lbl">Check-in base URL (your Railway URL)</div><input class="inp" id="s-url" value="'+DATA.settings.checkinUrl+'"></div></div>';
  h+='<div style="margin-bottom:10px"><div class="lbl">EZTexting username / email</div><input class="inp" id="s-eu" value="'+DATA.settings.ezUser+'" placeholder="your@email.com"></div>';
  h+='<button class="btn btn-blue" onclick="doSaveSettings()">Save settings</button></div>';

  h+='<div class="card"><div class="card-hd">Campaign image for QR texts</div>';
  h+='<div style="font-size:12px;color:var(--t2);margin-bottom:10px">Upload your event flyer. Each voter\'s QR code will be placed side-by-side with the image (nothing gets covered).</div>';
  if(DATA.hasCampaignImage){
    h+='<div class="row" style="align-items:center"><span class="tag tag-green">✓ Image uploaded</span><button class="btn btn-red" style="margin-left:8px" onclick="doRemoveCampaignImage()">Remove</button></div>';
    h+='<div style="font-size:12px;color:var(--t2);margin-top:6px">QR codes will be placed side-by-side with your image when sending MMS.</div>';
  }else{
    h+='<div class="row"><input type="file" id="ci-file" accept="image/*" class="inp" style="flex:1">';
    h+='<button class="btn btn-blue" onclick="doUploadCampaignImage()">Upload</button></div>';
    h+='<div style="font-size:12px;color:var(--t3);margin-top:6px">No image — QR codes sent as plain card with voter number.</div>';
  }
  h+='</div>';

  h+='<div class="card"><div class="card-hd">Change login credentials</div>';
  h+='<div class="help" style="margin-bottom:12px">Default login is <code>admin</code> / <code>voterqr2026</code> — change this now to secure your platform.</div>';
  h+='<div class="row"><div style="flex:1"><div class="lbl">New username</div><input class="inp" id="s-auser" placeholder="New username" autocomplete="off"></div>';
  h+='<div style="flex:1"><div class="lbl">New password</div><input type="password" class="inp" id="s-apass" placeholder="New password" autocomplete="new-password"></div></div>';
  h+='<button class="btn btn-blue" style="margin-top:10px" onclick="doChangeCredentials()">Update credentials</button></div>';
  return h;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
var TITLES={
  voters:{t:'Voters',s:'Manage your voter list'},
  segments:{t:'Segments',s:'Organize voters into groups'},
  campaigns:{t:'Campaigns',s:'Send text campaigns — runs on server, safe to close browser'},
  checkin:{t:'Event Check-In',s:'Staff only — scan or type voter #number'},
  followup:{t:'Early Vote Follow-Up',s:'Track who has voted'},
  dashboard:{t:'Dashboard',s:'Campaign overview'},
  settings:{t:'Settings',s:'Credentials, event config, campaign image'}
};

function render(){
  var info=TITLES[CUR]||{t:CUR,s:''};
  document.getElementById('pg-t').textContent=info.t;
  document.getElementById('pg-s').textContent=info.s;
  document.getElementById('top-stats').innerHTML=renderTopStats();
  var pg=document.getElementById('page');
  if(CUR==='voters')pg.innerHTML=renderVoters();
  else if(CUR==='segments')pg.innerHTML=renderSegments();
  else if(CUR==='campaigns')pg.innerHTML=renderCampaigns();
  else if(CUR==='checkin')pg.innerHTML=renderCheckIn();
  else if(CUR==='followup')pg.innerHTML=renderFollowUp();
  else if(CUR==='dashboard')pg.innerHTML=renderDashboard();
  else if(CUR==='settings')pg.innerHTML=renderSettings();
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
if(TOKEN){
  showApp();
}else{
  document.getElementById('login-screen').style.display='flex';
}
</script>
</body>
